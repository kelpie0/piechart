<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playSound(type) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'correct') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
            osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); 
            osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2); 
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
        } else if (type === 'type') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }
    }

    let countriesData = [];
    let currentCountry = null;
    let chartInstance = null;

    const inputEl = document.getElementById('guess-input');
    const messageEl = document.getElementById('message');
    const wrapperEl = document.getElementById('chart-wrapper');

    async function initGame() {
        messageEl.textContent = "loading data...";
        try {
            const res = await fetch('https://restcountries.com/v3.1/all?fields=name,flags,status');
            if (!res.ok) throw new Error('API temporarily down');
            
            const data = await res.json();
            
            // Filter for valid territories that actually have a PNG flag attached
            countriesData = data.filter(c => c.status === 'officially-assigned' && c.flags && c.flags.png);
            
            if (countriesData.length === 0) throw new Error('No data parsed');
            
            nextRound();
        } catch (err) {
            console.error("Fetch error:", err);
            messageEl.textContent = "api error. please refresh the page.";
        }
    }

    async function nextRound() {
        inputEl.value = '';
        messageEl.textContent = '';
        
        currentCountry = countriesData[Math.floor(Math.random() * countriesData.length)];
        
        try {
            const colors = await extractFlagColors(currentCountry.flags.png);
            renderChart(colors);
        } catch(e) {
            console.error("Flag parsing failed, skipping to next:", e);
            // If one specific flag's CORS fails, just smoothly skip to the next one
            nextRound();
        }
    }

    function extractFlagColors(src) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.crossOrigin = "anonymous"; 
            
            // Add a cache-buster to prevent the browser from blocking old non-CORS cached images
            img.src = src + "?not-from-cache-please"; 
            
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 30; 
                canvas.height = 20;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                try {
                    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                    const colorMap = {};

                    for(let i = 0; i < imgData.length; i += 4) {
                        if(imgData[i+3] < 128) continue; 
                        
                        const r = Math.round(imgData[i] / 25) * 25;
                        const g = Math.round(imgData[i+1] / 25) * 25;
                        const b = Math.round(imgData[i+2] / 25) * 25;
                        const hex = `#${((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1)}`;
                        
                        colorMap[hex] = (colorMap[hex] || 0) + 1;
                    }

                    const total = Object.values(colorMap).reduce((a, b) => a + b, 0);
                    const sorted = Object.entries(colorMap)
                        .map(([color, count]) => ({ color, pct: (count / total) * 100 }))
                        .filter(c => c.pct > 3); 

                    resolve(sorted);
                } catch(e) {
                    reject(e);
                }
            };
            img.onerror = (e) => reject(e);
        });
    }

    function renderChart(colorData) {
        if (chartInstance) chartInstance.destroy();

        const ctx = document.getElementById('flagChart').getContext('2d');
        chartInstance = new Chart(ctx, {
            type: 'pie',
            data: {
                datasets: [{
                    data: colorData.map(c => c.pct),
                    backgroundColor: colorData.map(c => c.color),
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { tooltip: { enabled: false }, legend: { display: false } },
                animation: { duration: 1000, easing: 'easeOutQuart' }
            }
        });
    }

    inputEl.addEventListener('input', (e) => {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        playSound('type');

        const guess = e.target.value.trim().toLowerCase();
        const commonName = currentCountry.name.common.toLowerCase();
        const officialName = currentCountry.name.official.toLowerCase();

        if (guess === commonName || guess === officialName) {
            playSound('correct');
            messageEl.textContent = `correct! it's ${currentCountry.name.common}.`;
            wrapperEl.classList.add('correct-anim');
            
            setTimeout(() => {
                wrapperEl.classList.remove('correct-anim');
                nextRound();
            }, 1200);
        }
    });

    initGame();
</script>
