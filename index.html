<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chartdle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'DM Sans', sans-serif;
        }

        body {
            background: #121212;
            color: #aeaeae;
            text-transform: lowercase;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 360px;
            width: 90%;
            text-align: center;
            animation: fadeIn 0.4s ease-out;
        }

        h1 {
            font-weight: 400;
            font-size: 1.5rem;
            letter-spacing: 0.5px;
            margin-bottom: 2rem;
            color: #ffffff;
        }

        #chart-wrapper {
            position: relative;
            width: 200px;
            height: 200px;
            margin-bottom: 1.5rem;
        }

        /* simple flat list for percentages */
        #color-legend {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 2.5rem;
            width: 100%;
        }

        .legend-item {
            display: flex;
            align-items: center;
            font-size: 0.85rem;
            color: #888888;
            font-weight: 400;
        }

        .color-dot {
            width: 10px;
            height: 10px;
            border-radius: 2px;
            margin-right: 6px;
            display: inline-block;
        }

        #input-container {
            width: 100%;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px 0;
            background: transparent;
            border: none;
            border-bottom: 1px solid #333333;
            color: #ffffff;
            font-size: 1rem;
            outline: none;
            text-align: center;
            transition: border-color 0.2s ease;
        }

        input[type="text"]:focus {
            border-color: #666666;
        }

        input[type="text"]::placeholder {
            color: #444444;
        }

        #message {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            height: 20px;
            color: #888888;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* simple flat scaling animation for correct guesses */
        @keyframes correctBounce {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        .correct-anim {
            animation: correctBounce 0.4s ease-in-out;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>chartdle</h1>
        
        <div id="chart-wrapper">
            <canvas id="flagChart"></canvas>
        </div>

        <div id="color-legend"></div>

        <div id="input-container">
            <input type="text" id="guess-input" placeholder="type country..." autocomplete="off">
        </div>

        <div id="message"></div>
    </div>

    <script src="flags.js"></script>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.08); 
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'type') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(100, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.02);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.02);
            }
        }

        let currentCountry = null;
        let chartInstance = null;
        let lastSelectedIndex = -1;

        const inputEl = document.getElementById('guess-input');
        const messageEl = document.getElementById('message');
        const wrapperEl = document.getElementById('game-container');
        const legendEl = document.getElementById('color-legend');

        function initGame() {
            if (typeof flagData === 'undefined' || flagData.length === 0) {
                messageEl.textContent = "error: flags.js missing.";
                return;
            }
            nextRound();
        }

        function nextRound() {
            inputEl.value = '';
            messageEl.textContent = '';
            legendEl.innerHTML = '';
            
            let randomIndex;
            do {
                randomIndex = Math.floor(Math.random() * flagData.length);
            } while (randomIndex === lastSelectedIndex && flagData.length > 1);
            
            lastSelectedIndex = randomIndex;
            currentCountry = flagData[randomIndex];
            
            renderChart(currentCountry.colors);
            renderLegend(currentCountry.colors);
        }

        function renderChart(colorData) {
            if (chartInstance) chartInstance.destroy();

            const ctx = document.getElementById('flagChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'pie',
                data: {
                    datasets: [{
                        data: colorData.map(c => c.pct),
                        backgroundColor: colorData.map(c => c.hex),
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { tooltip: { enabled: false }, legend: { display: false } },
                    animation: { duration: 400, easing: 'easeOutCubic' }
                }
            });
        }

        // build the flat text legend with percentages next to colors
        function renderLegend(colorData) {
            legendEl.innerHTML = '';
            colorData.forEach(c => {
                const item = document.createElement('div');
                item.className = 'legend-item';
                
                // clear presentation formatting: format down to 1 decimal place max
                const displayPct = Number(c.pct).toFixed(1).replace('.0', '');
                
                item.innerHTML = `
                    <span class="color-dot" style="background: ${c.hex}"></span>
                    ${displayPct}%
                `;
                legendEl.appendChild(item);
            });
        }

        inputEl.addEventListener('input', (e) => {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            playSound('type');

            const guess = e.target.value.trim().toLowerCase();

            if (guess === currentCountry.name.toLowerCase()) {
                playSound('correct');
                messageEl.textContent = `correct: ${currentCountry.name}`;
                wrapperEl.classList.add('correct-anim');
                
                setTimeout(() => {
                    wrapperEl.classList.remove('correct-anim');
                    nextRound();
                }, 1000);
            }
        });

        initGame();
    </script>
</body>
</html>
